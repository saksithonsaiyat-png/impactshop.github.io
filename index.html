<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO TRADING | Exclusive System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: #030305;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(3, 3, 5, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo span {
            color: #E5B869;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: #aaa;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #E5B869;
        }

        .btn-nav {
            background: linear-gradient(135deg, #E5B869, #F5D08A);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(229, 184, 105, 0.4);
        }

        /* FLASH SALE BAR */
        .flash-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(255, 51, 102, 0.15);
            border-bottom: 1px solid rgba(255, 51, 102, 0.2);
            padding: 12px;
            text-align: center;
            z-index: 99;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .flash-bar span {
            color: #FF3366;
            font-weight: 600;
        }

        .timer {
            background: #FF3366;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 120px;
            background: linear-gradient(135deg, rgba(3, 3, 5, 0.9), rgba(3, 3, 5, 0.7)), 
                        url('https://d2xsxph8kpxj0f.cloudfront.net/310519663433219166/hFFY4vxL7wbBh68e3zLdbi/hero-banner-nBJ9YFqrybaGhNrZGkvgRz.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-content h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero-content h1 span {
            background: linear-gradient(135deg, #E5B869, #FFF8E7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #E5B869, #FFF);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(229, 184, 105, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: #E5B869;
            color: #E5B869;
        }

        .stats {
            display: flex;
            gap: 3rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
        }

        /* SECTION TITLE */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin: 60px 0 40px;
            font-weight: 700;
        }

        .section-title span {
            color: #E5B869;
        }

        /* TRUST SECTION */
        .trust-section {
            padding: 60px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .trust-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .trust-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(229, 184, 105, 0.2);
        }

        .trust-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .trust-value {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .trust-label {
            font-size: 0.95rem;
            color: #aaa;
        }

        /* PRODUCTS SECTION */
        .products-section {
            padding: 60px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(229, 184, 105, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .product-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .price-new {
            font-size: 1.8rem;
            font-weight: 700;
            color: #E5B869;
        }

        .price-old {
            font-size: 1rem;
            color: #666;
            text-decoration: line-through;
        }

        .btn-buy {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .product-card:hover .btn-buy {
            background: #E5B869;
            border-color: #E5B869;
            color: #000;
        }

        /* TESTIMONIALS */
        .testimonials-section {
            padding: 60px 0;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .testimonial-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 15px;
        }

        .stars {
            color: #E5B869;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .testimonial-text {
            color: #aaa;
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.6;
            font-style: italic;
        }

        .author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E5B869, rgba(229, 184, 105, 0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 700;
        }

        .author-name {
            font-weight: 600;
        }

        .author-role {
            font-size: 0.8rem;
            color: #888;
        }

        /* FOOTER */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 0;
            margin-top: 60px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .footer-section h4 {
            font-size: 1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 10px;
        }

        .footer-section a {
            color: #888;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .footer-section a:hover {
            color: #E5B869;
        }

        .footer-bottom {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-box {
            background: #0D0D12;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-header {
            padding: 30px 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-price {
            font-size: 2rem;
            color: #E5B869;
            font-weight: 700;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-desc {
            color: #aaa;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .features-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .features-list li {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            color: #aaa;
            font-size: 0.95rem;
        }

        .features-list li:before {
            content: "✓";
            color: #E5B869;
            font-weight: 700;
            flex-shrink: 0;
        }

        .qr-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .qr-section p {
            color: #aaa;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .qr-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }

        .qr-box img {
            max-width: 100%;
            max-height: 160px;
        }

        .btn-line {
            width: 100%;
            padding: 12px;
            background: rgba(6, 199, 85, 0.1);
            border: 1px solid rgba(6, 199, 85, 0.3);
            color: #06C755;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .btn-line:hover {
            background: #06C755;
            color: #fff;
        }

        .qr-line {
            display: none;
        }

        .qr-line.show {
            display: block;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .section-title {
                font-size: 1.8rem;
            }

            .stats {
                gap: 1.5rem;
            }

            .stat-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <div class="container">
            <div class="nav-content">
                <div class="logo">PRO<span>TRADING</span></div>
                <div class="nav-links">
                    <a onclick="scrollTo('products')">ระบบเทรด</a>
                    <a onclick="scrollTo('testimonials')">รีวิว</a>
                    <a onclick="scrollTo('footer')">ติดต่อ</a>
