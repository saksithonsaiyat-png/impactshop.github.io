<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO TRADING | Exclusive System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #030305;
            --gold: #E5B869;
            --gold-glow: rgba(229, 184, 105, 0.35);
            --cyan: #00F0FF;
            --cyan-glow: rgba(0, 240, 255, 0.25);
            --text-main: #FFFFFF;
            --text-muted: #8892B0;
            --danger: #FF3366;
            --success: #00E676;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(229, 184, 105, 0.06), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.04), transparent 30%);
            background-color: var(--bg-color);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: linear-gradient(to bottom, black 30%, transparent 90%);
            -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 90%);
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: transparent;
            transition: all 0.5s ease;
            padding: 1rem 2%;
        }

        .navbar.scrolled {
            background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .navbar-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .navbar-brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--gold), #F5D08A);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(229, 184, 105, 0.4);
            font-size: 0.9rem;
            color: #000;
        }

        .navbar-brand span:last-child {
            color: var(--gold);
            font-weight: 300;
            margin-left: 5px;
        }

        .navbar-menu {
            display: none;
            gap: 2rem;
            align-items: center;
        }

        .navbar-menu a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
            cursor: pointer;
        }

        .navbar-menu a:hover {
            color: var(--gold);
        }

        .navbar-cta {
            background: linear-gradient(135deg, var(--gold), #F5D08A);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 30px var(--gold-glow);
            transition: all 0.3s;
        }

        .navbar-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px var(--gold-glow);
        }

        @media (min-width: 768px) {
            .navbar-menu {
                display: flex;
            }
        }

        /* Top Bar */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 51, 102, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 51, 102, 0.2);
            padding: 12px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 64px;
        }

        .top-bar span {
            color: var(--danger);
            font-size: 1rem;
            font-weight: 500;
        }

        .timer {
            background: var(--danger);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
        }

        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* Hero Section */
        .hero {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 60px;
            position: relative;
            background-image: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663433219166/hFFY4vxL7wbBh68e3zLdbi/hero-banner-nBJ9YFqrybaGhNrZGkvgRz.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #030305, rgba(3, 3, 5, 0.8), rgba(3, 3, 5, 0.4));
            z-index: 1;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #030305, transparent);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 700px;
        }

        .hero-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: var(--gold);
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            animation: fadeInDown 1s ease;
            display: inline-block;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .hero h1 span {
            background: linear-gradient(135deg, var(--gold), #FFF8E7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.7;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .btn-glow {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 45px;
            font-family: 'Kanit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            background: linear-gradient(135deg, var(--gold), #FFF);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--gold-glow);
        }

        .btn-glow:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px var(--gold-glow);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Stats */
        .hero-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            justify-content: center;
            margin-top: 3rem;
            animation: fadeInUp 1s ease 0.8s both;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }

        /* Trust Section */
        .trust-section {
            padding: 4rem 0;
            position: relative;
        }

        .trust-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .trust-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .trust-card:hover {
            background: var(--surface-hover);
            border-color: rgba(229, 184, 105, 0.2);
        }

        .trust-icon {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .trust-value {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .trust-label {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .trust-sub {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
        }

        /* Shop Section */
        .shop-section {
            padding: 5rem 0;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            font-weight: 700;
        }

        .section-title span {
            color: var(--gold);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Product Card */
        .card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(229, 184, 105, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px var(--gold-glow);
        }

        .card-img {
            height: 200px;
            width: 100%;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.08);
        }

        .card-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid var(--danger);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 2;
        }

        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 300;
        }

        .card-price-wrap {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 1.5rem;
            margin-top: auto;
        }

        .price-new {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
        }

        .price-old {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-decoration: line-through;
            font-weight: 300;
        }

        .btn-buy {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            font-family: 'Kanit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover .btn-buy {
            background: var(--gold);
            border-color: var(--gold);
            color: #000;
            font-weight: 600;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #0D0D12;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }

        .close-btn {
